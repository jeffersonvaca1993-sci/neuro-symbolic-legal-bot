language: es
recipe: default.v1
domain: "domain/"

pipeline:
- name: WhitespaceTokenizer
- name: LanguageModelFeaturizer
  model_name: "bert"
  model_weights: "dccuchile/bert-base-spanish-wwm-cased"
- name: DIETClassifier
  epochs: 100
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
- name: FallbackClassifier
  threshold: 0.55
  ambiguity_threshold: 0.1

policies:
- name: RulePolicy
  core_fallback_threshold: 0.55
  core_fallback_action_name: "custom_ask_affirmation"
- name: MemoizationPolicy
  # Re-introducimos TEDPolicy para que el bot pueda seguir las historias
- name: TEDPolicy
  max_history: 5
  epochs: 100
assistant_id: 20250710-165920-brown-steel
