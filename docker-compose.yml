services:
  rasa:
    image: rasa/rasa:3.5.17-full
    container_name: rasa_server
    ports:
      - "5005:5005"
    volumes:
      - ./:/app
    command: >
      run --model /app/models --enable-api --cors '*' --debug --endpoints /app/endpoints.yml --credentials /app/credentials.yml

  action_server:
    image: rasa/rasa-sdk:3.5.0
    container_name: action_server
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    environment:
      - RASA_ACTIONS_PORT=5055